<svg xmlns="http://www.w3.org/2000/svg" width="780" height="330" viewBox="0 0 780 330" font-family="Menlo, Consolas, 'DejaVu Sans Mono', monospace" font-size="13">
  <!-- Terminal transcript of a real run: `duelo rank examples/battles.jsonl`.
       Text content is copied verbatim from an actual execution against the
       committed sample log (regenerate with examples/generate_battles.py). -->
  <rect width="780" height="330" rx="10" fill="#0d1117"/>
  <rect width="780" height="34" rx="10" fill="#161b22"/>
  <rect y="20" width="780" height="14" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#febc2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="390" y="22" fill="#8b949e" text-anchor="middle" font-size="12">duelo — rankings with confidence intervals</text>
  <g fill="#c9d1d9" xml:space="preserve">
    <text x="24" y="64"><tspan fill="#7ee787">$</tspan> duelo rank examples/battles.jsonl</text>
    <text x="24" y="92" fill="#8b949e">bradley-terry leaderboard - 400 battles, 35 ties, ci=analytic</text>
    <text x="24" y="116" fill="#79c0ff">rank  item        rating            95% CI  games  wins  losses  ties   win%</text>
    <text x="24" y="136" fill="#30363d">----  ----------  ------  ----------------  -----  ----  ------  ----  -----</text>
    <text x="24" y="160">   1  <tspan fill="#7ee787">nova-large</tspan>  <tspan fill="#e3b341">1175.9</tspan>  1123.7 .. 1228.1    164   119      32    13  76.5%</text>
    <text x="24" y="184">   2  crest-2     <tspan fill="#e3b341">1089.2</tspan>  1043.8 .. 1134.6    182   110      56    16  64.8%</text>
    <text x="24" y="208">   3  puffin-xl    <tspan fill="#e3b341">994.9</tspan>   944.8 .. 1044.9    139    61      70     8  46.8%</text>
    <text x="24" y="232">   4  nova-mini    <tspan fill="#e3b341">948.6</tspan>    900.8 .. 996.3    159    55      88    16  39.6%</text>
    <text x="24" y="256">   5  <tspan fill="#f85149">harbor-1</tspan>     <tspan fill="#e3b341">791.5</tspan>    733.8 .. 849.1    156    20     119    17  18.3%</text>
    <text x="24" y="292"><tspan fill="#7ee787">$</tspan> duelo rank examples/battles.jsonl --ci bootstrap --seed 42   <tspan fill="#8b949e"># same input, same CIs</tspan></text>
  </g>
</svg>
